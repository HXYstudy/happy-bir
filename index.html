            function schedule(fn, delay) {
                const id = window.setTimeout(() => {
                    scheduledTimers = scheduledTimers.filter(timerId => timerId !== id);
                    fn();
                }, delay);
                scheduledTimers.push(id);
                return id;
            }

            function clearScheduledTimers() {
                scheduledTimers.forEach(id => window.clearTimeout(id));
                scheduledTimers = [];
                window.clearInterval(countdownTimer);
                countdownTimer = 0;
            }

            function resize() {
                viewW = window.innerWidth || 1;
                viewH = window.innerHeight || 1;
                dpr = Math.min(window.devicePixelRatio || 1, MAX_DPR);

                canvas.width = Math.round(viewW * dpr);
                canvas.height = Math.round(viewH * dpr);
                canvas.style.width = `${viewW}px`;
                canvas.style.height = `${viewH}px`;
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

                sampleCanvas.width = viewW;
                sampleCanvas.height = viewH;
                initBackgroundStars();
                rebuildCurrentShape();
            }

            function initBackgroundStars() {
                const count = clamp(Math.round((viewW * viewH) / 14000), 54, 130);
                backgroundStars = Array.from({ length: count }, () => ({
                    x: Math.random() * viewW,
                    y: Math.random() * viewH,
                    size: Math.random() * 1.15 + 0.35,
                    alpha: Math.random(),
                    speed: Math.random() * 0.012 + 0.003,
                    drift: (Math.random() - 0.5) * 0.08,
                    layer: Math.random() * 0.8 + 0.2
                }));
            }

            function getRotationValues(rotX, rotY) {
                if (rotationCache.x !== rotX || rotationCache.y !== rotY) {
                    rotationCache = {
                        x: rotX,
                        y: rotY,
                        cosX: Math.cos(rotX),
                        sinX: Math.sin(rotX),
                        cosY: Math.cos(rotY),
                        sinY: Math.sin(rotY)
                    };
                }
                return rotationCache;
            }

            function globeYOffset() {
                return -clamp(viewH * 0.1, 34, 88);
            }

            function rotatePoint(x, y, z, rotX, rotY) {
                const rotation = getRotationValues(rotX, rotY);
                const cosX = rotation.cosX;
                const sinX = rotation.sinX;
                const y1 = y * cosX - z * sinX;
                const z1 = y * sinX + z * cosX;
                const cosY = rotation.cosY;
                const sinY = rotation.sinY;
                return {
                    x: x * cosY + z1 * sinY,
                    y: y1,
                    z: -x * sinY + z1 * cosY
                };
            }

            // ═══════════════════════════════════════
            // 3D投影与旋转（手写软渲染）
            // ═══════════════════════════════════════
            function projectPoint(x, y, z) {
                const denominator = Math.max(160, FOV + CAMERA_DIST - z);
                const scale = FOV / denominator;
                return {
                    x: viewW / 2 + x * scale * WORLD_SCALE,
                    y: viewH / 2 + y * scale * WORLD_SCALE,
                    scale
                };
            }

            // ═══════════════════════════════════════
            // 粒子系统
            // ═══════════════════════════════════════
            class QuantumParticle3D {
                constructor(target, type = "normal", options = {}) {
                    this.x = options.x ?? (Math.random() * viewW - viewW / 2);
                    this.y = options.y ?? (Math.random() * viewH - viewH / 2);
                    this.z = options.z ?? ((Math.random() - 0.5) * 430);
                    this.tx = target.x;
                    this.ty = target.y;
                    this.tz = target.z;
                    this.curX = viewW / 2;
                    this.curY = viewH / 2;
                    this.color = target.color;
                    this.size = options.size ?? (Math.random() * 1.55 + 1.08);
                    this.alpha = options.alpha ?? 0;
                    this.ease = options.ease ?? 0.078;
                    this.type = type;
                    this.vx = options.vx ?? ((Math.random() - 0.5) * 11);
                    this.vy = options.vy ?? ((Math.random() - 0.5) * 11);
                    this.vz = options.vz ?? ((Math.random() - 0.5) * 11);
                }

                update(rotX, rotY) {
                    if (currentState === STATE.BURST && this.type === "burst") {
                        this.x += this.vx;
                        this.y += this.vy;
                        this.z += this.vz;
                        this.vx *= 0.987;
                        this.vy = this.vy * 0.987 + 0.03;
                        this.vz *= 0.987;
                        this.alpha -= 0.016;
                        const projected = projectPoint(this.x, this.y, this.z);
                        this.curX = projected.x;
                        this.curY = projected.y;
                        return;
                    }

                    this.x += (this.tx - this.x) * this.ease;
                    this.y += (this.ty - this.y) * this.ease;
                    this.z += (this.tz - this.z) * this.ease;

                    const fixedFacing = this.type === "text" || this.type === "title";
                    const rotated = fixedFacing ? { x: this.x, y: this.y, z: this.z } : rotatePoint(this.x, this.y, this.z, rotX, rotY);
                    const projected = projectPoint(rotated.x, rotated.y, rotated.z);
                    const depthAlpha = clamp(0.3 + ((rotated.z + 300) / 600) * 0.55, 0.24, 0.88);

                    this.curX = projected.x;
                    this.curY = projected.y + (this.type === "nebula" ? globeYOffset() : 0);
                    this.alpha += ((this.type === "nebula" ? depthAlpha * 0.82 : depthAlpha) - this.alpha) * 0.12;
                    this.renderSize = this.size * clamp(projected.scale * (this.type === "nebula" ? 1.9 : 1.65), 0.9, 1.78);
                }

                draw() {
                    if (this.alpha <= 0.01 || this.curX < -10 || this.curX > viewW + 10 || this.curY < -10 || this.curY > viewH + 10) {
                        return;
                    }

                    ctx.globalAlpha = this.alpha;
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(this.curX, this.curY, this.renderSize || this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // ═══════════════════════════════════════
            // 场景构建：文字/蛋糕/星球/烟花
            // ═══════════════════════════════════════
            function getExtrudedText3DPoints(text, size = 110, zDepth = 24, yOffset = 0, xOffset = 0) {
                sampleCtx.setTransform(1, 0, 0, 1, 0, 0);
                sampleCtx.clearRect(0, 0, viewW, viewH);
                sampleCtx.fillStyle = "#fff";
                sampleCtx.textAlign = "center";
                sampleCtx.textBaseline = "middle";
                sampleCtx.font = `800 ${size}px "Microsoft YaHei", "PingFang SC", sans-serif`;
                sampleCtx.fillText(text, viewW / 2 + xOffset, viewH / 2 + yOffset);

                const imgData = sampleCtx.getImageData(0, 0, viewW, viewH);
                const points = [];
                const step = clamp(Math.round(Math.min(viewW, viewH) / 130), 4, 6);
                const scale = clamp(Math.min(viewW / 560, viewH / 500), 0.95, 1.45);

                for (let y = 0; y < viewH; y += step) {
                    for (let x = 0; x < viewW; x += step) {
                        if (imgData.data[(y * viewW + x) * 4 + 3] > 150) {
                            const cx = (x - viewW / 2) * scale;
                            const cy = (y - viewH / 2) * scale;
                            for (let z = -zDepth / 2; z <= zDepth / 2; z += 10) {
                                points.push({
                                    x: cx,
                                    y: cy,
                                    z,
                                    color: `hsl(${190 + Math.random() * 28}, 100%, ${60 + Math.random() * 12}%)`
                                });
                            }
                        }
                    }
                }

                sampleCtx.clearRect(0, 0, viewW, viewH);
                return points;
            }

            function getCake3DPoints() {
                const points = [];
                const s = clamp(Math.min(viewW / 620, viewH / 560), 0.9, 1.34);
                const centerY = 68;

                function addCylinder(yStart, yEnd, radius, innerRadius, stepH, stepR, hueA, hueB) {
                    for (let h = yStart; h < yEnd; h += stepH) {
                        for (let r = 0; r <= radius; r += stepR) {
                            if (r < innerRadius && h > yStart + stepH && h < yEnd - stepH) continue;
                            const angleStep = Math.max(0.09, 1.35 / Math.max(r, 1));
                            for (let a = 0; a < Math.PI * 2; a += angleStep) {
                                const mix = Math.random();
                                points.push({
                                    x: Math.cos(a) * r * s,
                                    y: (centerY - h) * s,
                                    z: Math.sin(a) * r * s,
                                    color: mix > 0.22 ? hueA : hueB
                                });
                            }
                        }
                    }
                }

                addCylinder(0, 56, 148, 118, 5.6, 10, "#006dff", "#d8f5ff");
                addCylinder(56, 101, 104, 78, 5.4, 9, "#02b7ff", "#ffffff");
                addCylinder(101, 136, 68, 48, 5, 8, "#21ffff", "#ffffff");

                for (let h = 136; h < 176; h += 4.6) {
                    for (let r = 0; r <= 5.5; r += 2.4) {
                        for (let a = 0; a < Math.PI * 2; a += 0.58) {
                            points.push({
                                x: Math.cos(a) * r * s,
                                y: (centerY - h) * s,
                                z: Math.sin(a) * r * s,
                                color: h > 165 ? "#bfffff" : "#ffffff"
                            });
                        }
                    }
                }

                return points;
            }

            function currentSphereRadius() {
                const wideSphere = Math.min(viewW * 0.74, viewH * 0.54);
                return clamp(wideSphere, 240, 540);
            }

            function getNebulaSpherePoints(count = 1850) {
                const points = [];
                const baseRadius = currentSphereRadius();

                for (let i = 0; i < count; i++) {
                    const phi = Math.acos(-1 + (2 * i) / count);
                    const theta = Math.sqrt(count * Math.PI) * phi;
                    const layer = Math.random();
                    const radius = layer > 0.72
                        ? baseRadius + Math.random() * baseRadius * 0.22
                        : layer > 0.36
                            ? baseRadius * (0.72 + Math.random() * 0.18)
                            : baseRadius * (0.34 + Math.random() * 0.3);
                    points.push({
                        x: radius * Math.sin(phi) * Math.cos(theta),
                        y: radius * Math.sin(phi) * Math.sin(theta),
                        z: radius * Math.cos(phi),
                        color: layer > 0.72
                            ? `hsl(${185 + Math.random() * 18}, 100%, ${74 + Math.random() * 14}%)`
                            : layer > 0.36
                                ? `hsl(${220 + Math.random() * 34}, 100%, ${52 + Math.random() * 16}%)`
                                : `hsl(${165 + Math.random() * 24}, 100%, ${48 + Math.random() * 18}%)`
                    });
                }

                return points;
            }

            function setParticlesFromPoints(points, type, maxCount, options = {}) {
                const previous = options.fromExisting ? particles.slice() : [];
                particles = [];
                const stride = Math.max(1, Math.ceil(points.length / maxCount));
                let sourceIndex = 0;
                for (let i = 0; i < points.length; i += stride) {
                    const source = previous.length ? previous[sourceIndex++ % previous.length] : null;
                    particles.push(new QuantumParticle3D(points[i], type, source ? {
                        x: source.x,
                        y: source.y,
                        z: source.z,
                        alpha: Math.min(0.75, source.alpha || 0.2),
                        ease: 0.045
                    } : {}));
                }
            }

            function appendParticlesFromPoints(points, type, maxCount) {
                const stride = Math.max(1, Math.ceil(points.length / maxCount));
                for (let i = 0; i < points.length; i += stride) {
                    particles.push(new QuantumParticle3D(points[i], type));
                }
            }

            function morphTo3DCount(num) {
                const size = clamp(Math.min(viewW * 0.55, viewH * 0.56), 132, 230);
                setParticlesFromPoints(getExtrudedText3DPoints(String(num), size, 34), "text", 3000);
            }

            function buildGreetingPoints(size, y, depth) {
                const line1 = greetingLine1 || "生日快乐";
                const line2 = greetingLine2 || "爱你宝贝";
                const totalChars = line1.length + line2.length;
                if (totalChars <= 8) {
                    const phraseGap = clamp(size * 2.65, 98, 240);
                    return getExtrudedText3DPoints(line1, size, depth, y, -phraseGap)
                        .concat(getExtrudedText3DPoints(line2, size, depth, y, phraseGap));
                }

                const compactSize = clamp(size * Math.min(1, 9 / Math.max(totalChars, 9)), 30, size);
                const lineGap = clamp(compactSize * 1.45, 48, 88);
                return getExtrudedText3DPoints(line1, compactSize, depth, y - lineGap / 2, 0)
                    .concat(getExtrudedText3DPoints(line2, compactSize, depth, y + lineGap / 2, 0));
            }

            function showBirthdayText() {
                const titleSize = clamp(viewW / 8.4, 44, 86);
                const lineY = -clamp(viewH * 0.05, 28, 54);
                setParticlesFromPoints(buildGreetingPoints(titleSize, lineY, 20), "text", 4400);
            }

            function showCake() {
                const wasCake = currentState === STATE.CAKE;
                currentState = STATE.CAKE;
                if (!wasCake) cakeEntryCount += 1;
                const useCandleIntro = cakeEntryCount === 1;
                window.clearTimeout(blowPromptTimer);
                window.clearTimeout(cakeAutoTimer);
                candleLit = useCandleIntro;
                candleSmoke = [];
                candleSparks = [];
                candleShockwaveStarted = 0;
                cakeAutoEntering = false;
                cakeReadyAt = useCandleIntro ? performance.now() + 900 : 0;
                openFrames = 0;
                blowCandleButton.textContent = "吹灭蜡烛";
                closePhotoManager();
                hideFloatingPhotoCaption();
                blowCandleButton.style.display = "none";
                particles = [];
                appendParticlesFromPoints(getCake3DPoints(), "cake", 3900);
                const titleSize = clamp(viewW / 9.2, 38, 70);
                const titleY = -clamp(viewH * 0.26, 126, 196);
                appendParticlesFromPoints(buildGreetingPoints(titleSize, titleY, 18), "title", 2400);
                uiLayer.style.opacity = "1";
                uiLayer.style.transform = "translateX(-50%)";
                if (useCandleIntro) {
                    setStatus("张开手掌吹灭蜡烛", "吹灭后会自动进入照片星球");
                } else {
                    setStatus("3D生日蛋糕已凝聚", "张开手掌可再次展开照片星球");
                }
            }

            function showGlobe() {
                currentState = STATE.GLOBE;
                blowCandleButton.style.display = "none";
                setParticlesFromPoints(getNebulaSpherePoints(), "nebula", Math.round(1850 * qualityScale), { fromExisting: true });
                transitionUntil = performance.now() + 1500;
                updateShapeLabel();
                setStatus("星系照片已展开", "比耶或点切换形态；抓住照片会显示已编辑文字");
            }

            function switchPhotoShape(direction = 1) {
                if (currentState !== STATE.GLOBE) return;
                currentShapeIndex = (currentShapeIndex + direction + PHOTO_SHAPES.length) % PHOTO_SHAPES.length;
                shapeTransitionUntil = performance.now() + 850;
                if (currentShape().id === "timeline") timelineAutoOffset = 0;
                updateShapeLabel();
                saveConfig();
                playTone("shape");
                setStatus(`已切换：${currentShape().label}`, currentShape().id === "timeline" ? "照片会按时间自动滚动播放" : "照片会按新形态重新排列");
            }

            function rebuildCurrentShape() {
                if (currentState === STATE.COUNTDOWN) {
                    morphTo3DCount(countdownNum);
                } else if (currentState === STATE.CAKE) {
                    showCake();
                } else if (currentState === STATE.GLOBE) {
                    setParticlesFromPoints(getNebulaSpherePoints(), "nebula", Math.round(1850 * qualityScale));
                }
            }

            function startCountdownSequence() {
                if (currentState !== STATE.IDLE) return;
                clearScheduledTimers();
                currentState = STATE.COUNTDOWN;
                countdownNum = 3;
                uiLayer.style.opacity = "1";
                uiLayer.style.transform = "translateX(-50%)";
                setStatus("量子粒子通道同步中", "倒计时开始");
                morphTo3DCount(countdownNum);
                playTone("tap");

                countdownTimer = window.setInterval(() => {
                    countdownNum -= 1;
                    if (countdownNum > 0) {
                        morphTo3DCount(countdownNum);
                    } else {
                        window.clearInterval(countdownTimer);
                        countdownTimer = 0;
                        triggerSuperNovaBurst();
                    }
                }, 1450);
            }

            function spawnBurstWave(multiplier = 1, origin = { x: 0, y: 0, z: 0 }) {
                const colors = ["#67f7ff", "#00bcff", "#ffffff", "#61a8ff", "#b6fff8", "#fff6d6"];
                for (let i = 0; i < 165 * multiplier; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const lift = (Math.random() - 0.5) * Math.PI;
                    const speed = 5 + Math.random() * 12;
                    particles.push(new QuantumParticle3D({ x: 0, y: 0, z: 0, color: colors[(Math.random() * colors.length) | 0] }, "burst", {
                        x: origin.x + (Math.random() - 0.5) * 44,
                        y: origin.y + (Math.random() - 0.5) * 44,
                        z: origin.z + (Math.random() - 0.5) * 36,
                        vx: Math.cos(angle) * Math.cos(lift) * speed,
                        vy: Math.sin(lift) * speed,
                        vz: Math.sin(angle) * Math.cos(lift) * speed,
                        alpha: 0.98,
                        size: Math.random() * 1.95 + 1.05
                    }));
                }
            }

            function triggerSuperNovaBurst() {
                currentState = STATE.BURST;
                particles = [];
                grabbedIndex = -1;
                blowCandleButton.style.display = "none";
                uiLayer.style.opacity = "0";
                uiLayer.style.transform = "translateX(-50%) translateY(-8px)";
                playTone("burst");

                spawnBurstWave(1.2, { x: 0, y: 0, z: 0 });
                schedule(() => spawnBurstWave(0.9, { x: -130, y: -70, z: 40 }), 170);
                schedule(() => spawnBurstWave(0.9, { x: 130, y: -55, z: -20 }), 340);
                schedule(() => spawnBurstWave(0.7, { x: -70, y: 90, z: 70 }), 540);
                schedule(() => spawnBurstWave(0.7, { x: 90, y: 80, z: -60 }), 740);
                schedule(showBirthdayText, 1350);
                schedule(showCake, 5600);
            }

            function updatePointer(clientX, clientY, pinch, mode) {
                inputMode = mode;
                lastInputAt = performance.now();
                const wasPinching = isPinching;
                const releasedIndex = grabbedIndex;
                handX = lerp(handX, clamp(clientX / viewW, 0, 1), 0.32);
                handY = lerp(handY, clamp(clientY / viewH, 0, 1), 0.32);
                isPinching = pinch;
                if (!isPinching) {
                    grabPalmBase = 0;
                    grabbedScale = 1;
                    pointerGrabScale = 1;
                    grabStartedAt = 0;
                }
                pointer.style.left = `${handX * viewW}px`;
                pointer.style.top = `${handY * viewH}px`;
                pointer.classList.toggle("is-pinching", isPinching);
                pointer.style.transform = isPinching ? "translate(-50%, -50%) scale(0.82)" : "translate(-50%, -50%) scale(1)";
            }

            function resetInputPoint() {
                isPinching = false;
                grabbedIndex = -1;
                grabPalmBase = 0;
                grabbedScale = 1;
                pointerGrabScale = 1;
                pointer.classList.remove("is-pinching");
                pointer.style.transform = "translate(-50%, -50%) scale(0)";
                hideFloatingPhotoCaption();
            }

            // ═══════════════════════════════════════
            // 手势识别与状态转换
            // ═══════════════════════════════════════
            function handleGesture(openFingers, fingerOpen, palmSize) {
                const now = performance.now();
                openFrames = openFingers >= 4 ? openFrames + 1 : 0;
                closedFrames = openFingers <= 1 && !isPinching ? closedFrames + 1 : 0;
                const peaceGesture = fingerOpen.index && fingerOpen.middle && !fingerOpen.ring && !fingerOpen.pinky;
                peaceFrames = peaceGesture ? peaceFrames + 1 : 0;

                if (currentState === STATE.IDLE) {
                    if (openFrames >= 6) {
                        openFrames = 0;
                        startCountdownSequence();
                    }
                    return;
                } else if (currentState === STATE.GLOBE && peaceFrames >= 10 && now > shapeGestureLockUntil && !isPinching) {
                    peaceFrames = 0;
                    shapeGestureLockUntil = now + 1200;
                    switchPhotoShape(1);
                } else if (currentState === STATE.CAKE && openFrames >= 3) {
                    if (now < gestureLockUntil) return;
                    if (cakeEntryCount === 1 && candleLit && now < cakeReadyAt) return;
                    if (cakeEntryCount === 1 && candleLit) {
                        blowOutCandle();
                        previousPalmSize = palmSize;
                        return;
                    }
                    if (cakeAutoEntering) return;
                    openFrames = 0;
                    showGlobe();
                } else if (currentState === STATE.GLOBE && closedFrames >= 4) {
                    closedFrames = 0;
                    grabbedIndex = -1;
                    showCake();
                }
            }

            function clampCardCenter(x, y, scale, card) {
                const margin = 12;
                const width = card.offsetWidth * scale;
                const height = card.offsetHeight * scale;
                return {
                    x: clamp(x, margin + width / 2, viewW - margin - width / 2),
                    y: clamp(y, margin + height / 2, viewH - margin - height / 2)
                };
            }

            function getPhotoSlot(i, total, radius, rotX, rotY, now = performance.now()) {
                const point = getPhotoShapePoint(i, total, radius, now);
                const x = point.x;
                const y = point.y;
                const z = point.z;
                const rotated = rotatePoint(x, y, z, rotX, rotY);
                const projected = projectPoint(rotated.x, rotated.y, rotated.z);
                projected.y += globeYOffset();
                return { rotated, projected };
            }

            function timelineRank(index) {
                const sorted = photoCards
                    .map((card, i) => ({ i, time: (card.dataset.time || "").trim(), content: (card.dataset.content || "").trim() }))
                    .sort((a, b) => {
                        if (a.time && b.time && a.time !== b.time) return a.time.localeCompare(b.time, "zh-CN", { numeric: true });
                        if (a.time && !b.time) return -1;
                        if (!a.time && b.time) return 1;
                        return a.i - b.i;
                    });
                const found = sorted.findIndex(item => item.i === index);
                return found === -1 ? index : found;
            }

            function getPhotoShapePoint(i, total, radius, now) {
                const shapeId = currentShape().id;
                const t = total <= 1 ? 0.5 : i / (total - 1);
                const phase = now * 0.00045 + i * 0.37;

                if (shapeId === "heart") {
                    const a = Math.PI * 2 * t;
                    const heartScale = radius * 0.065;
                    return {
                        x: 16 * Math.pow(Math.sin(a), 3) * heartScale,
                        y: -(13 * Math.cos(a) - 5 * Math.cos(2 * a) - 2 * Math.cos(3 * a) - Math.cos(4 * a)) * heartScale * 0.9,
                        z: Math.sin(a * 2 + now * 0.001) * radius * 0.16
                    };
                }

                if (shapeId === "timeline") {
                    const rank = timelineRank(i);
                    const tt = total <= 1 ? 0.5 : ((rank / total + timelineAutoOffset) % 1);
                    return {
                        x: (tt - 0.5) * Math.min(viewW * 0.68, radius * 2.2),
                        y: Math.sin(tt * Math.PI * 2) * radius * 0.12,
                        z: (0.5 - Math.abs(tt - 0.5)) * radius * 0.34
                    };
                }

                if (shapeId === "wall") {
                    const cols = Math.ceil(Math.sqrt(total * 1.45));
                    const rows = Math.ceil(total / cols);
                    const col = i % cols;
                    const row = Math.floor(i / cols);
                    const gapX = Math.min(118, viewW * 0.72 / Math.max(1, cols - 1));
                    const gapY = Math.min(132, viewH * 0.48 / Math.max(1, rows - 1));
                    return {
                        x: (col - (cols - 1) / 2) * gapX,
                        y: (row - (rows - 1) / 2) * gapY,
                        z: Math.sin(phase) * radius * 0.08
                    };
                }

                const phi = Math.acos(-1 + (2 * i) / total);
                const theta = Math.sqrt(total * Math.PI) * phi;
                return {
                    x: radius * Math.sin(phi) * Math.cos(theta),
                    y: radius * Math.sin(phi) * Math.sin(theta),
                    z: radius * Math.cos(phi)
                };
            }

            function update3DPhotoGlobe(now) {
                if (currentState !== STATE.GLOBE) {
                    if (photoContainer.style.display !== "none") photoContainer.style.display = "none";
                    if (photoManagerPanel.classList.contains("is-open")) closePhotoManager();
                    hideFloatingPhotoCaption();
                    return;
                }

                if (photoContainer.style.display !== "block") photoContainer.style.display = "block";
                const radius = currentSphereRadius();
                if (currentShape().id === "timeline" && !isPinching) {
                    timelineAutoOffset = (timelineAutoOffset + 0.00016 * Math.max(1, photoCards.length / 10)) % 1;
                }
                targetAngleY = (handX - 0.5) * Math.PI * 1.82;
                targetAngleX = (handY - 0.5) * Math.PI * 1.06;
                angleY += (targetAngleY - angleY) * 0.09;
                angleX += (targetAngleX - angleX) * 0.09;

                const rotY = angleY + now * 0.00022;
                const rotX = angleX;

                if (isPinching && grabbedIndex === -1) {
                    let closestIdx = -1;
                    let bestScore = Infinity;
                    photoCards.forEach((card, i) => {
                        const slot = getPhotoSlot(i, photoCards.length, radius, rotX, rotY);
                        const depth = clamp((slot.rotated.z + radius) / (radius * 2), 0, 1);
                        if (depth < 0.18) return;
                        const d = Math.hypot(slot.projected.x - handX * viewW, slot.projected.y - handY * viewH);
                        const featuredBoost = card.dataset.featured === "true" ? 1.45 : 1;
                        const hitRadius = Math.max(118, card.offsetWidth * 2.55) * (0.72 + depth * 0.42) * featuredBoost;
                        const score = d - depth * (card.dataset.featured === "true" ? 88 : 54);
                        if (d < hitRadius && score < bestScore) {
                            bestScore = score;
                            closestIdx = i;
                        }
                    });

                    if (closestIdx === -1) {
                        let fallbackScore = Infinity;
                        photoCards.forEach((card, i) => {
                            const slot = getPhotoSlot(i, photoCards.length, radius, rotX, rotY);
                            const depth = clamp((slot.rotated.z + radius) / (radius * 2), 0, 1);
                            if (depth < 0.32) return;
                            const d = Math.hypot(slot.projected.x - handX * viewW, slot.projected.y - handY * viewH);
                            const score = d - depth * 92;
                            if (d < Math.max(170, card.offsetWidth * 3.2) && score < fallbackScore) {
                                fallbackScore = score;
                                closestIdx = i;
                            }
                        });
                    }

                    grabbedIndex = closestIdx;
                    if (grabbedIndex !== -1) {
                        grabPalmBase = Math.max(0.035, currentPalmSize);
                        grabbedScale = 1;
                        grabStartedAt = performance.now();
                        playTone("grab");
                    }
                }

                photoCards.forEach((card, i) => {
                    if (isPinching && i === grabbedIndex) {
                        card.classList.add("is-grabbed");
                        renderPhotoCaption(card);
                        const targetDepthScale = inputMode === "camera"
                            ? clamp(currentPalmSize / Math.max(0.035, grabPalmBase || currentPalmSize), 0.58, 1.85)
                            : pointerGrabScale;
                        grabbedScale += (targetDepthScale - grabbedScale) * 0.18;
                        const baseScale = clamp(Math.min(viewW / 430, viewH / 620), 0.92, 1.18);
                        const scale = clamp(baseScale * grabbedScale, 0.56, 2.15);
                        const safe = clampCardCenter(handX * viewW, handY * viewH, scale, card);
                        const x = safe.x - viewW / 2;
                        const y = safe.y - viewH / 2;
                        showFloatingPhotoCaption(card, safe.x, safe.y, card.offsetHeight * scale);
                        card.style.opacity = "1";
                        card.style.zIndex = "4000";
                        card.style.transform = `translate(-50%, -50%) translate3d(${x}px, ${y}px, 0) scale(${scale}) rotate(0deg)`;
                        return;
                    }

                    card.classList.remove("is-grabbed");
                    const slot = getPhotoSlot(i, photoCards.length, radius, rotX, rotY);
                    const depth = clamp((slot.rotated.z + radius) / (radius * 2), 0, 1);
                    const featuredScale = card.dataset.featured === "true" ? 1.25 : 1;
                    const wallBoost = currentShape().id === "wall" ? 1.22 : currentShape().id === "timeline" ? 1.08 : 1;
                    const intro = shapeTransitionUntil > now ? 0.72 + (1 - (shapeTransitionUntil - now) / 850) * 0.28 : 1;
                    const scale = clamp(slot.projected.scale * 1.35 * featuredScale * wallBoost * intro, 0.34, 0.94);
                    const tilt = (i % 2 === 0 ? -1 : 1) * (3 + depth * 4);
                    const x = slot.projected.x - viewW / 2;
                    const y = slot.projected.y - viewH / 2;

                    card.style.opacity = String(clamp((0.22 + depth * 0.76 + (card.dataset.featured === "true" ? 0.12 : 0)) * intro, 0.2, 1));
                    card.style.zIndex = String(Math.round(1000 + depth * 900 + (card.dataset.featured === "true" ? 80 : 0)));
                    card.style.transform = `translate(-50%, -50%) translate3d(${x}px, ${y}px, 0) scale(${scale}) rotate(${tilt}deg)`;
                });

                if (!isPinching) {
                    grabbedIndex = -1;
                    hideFloatingPhotoCaption();
                }
            }

            function onHandResults(results) {
                if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
                    if (inputMode === "camera") resetInputPoint();
                    openFrames = 0;
                    closedFrames = 0;
                    return;
                }

                const landmarks = results.multiHandLandmarks[0];
                const rawX = 1 - landmarks[9].x;
                const rawY = landmarks[9].y;
                const wrist = landmarks[0];
                const palmSize = Math.max(0.035, distance3D(wrist, landmarks[9]));
                currentPalmSize = palmSize;
                const thumb = landmarks[4];
                const index = landmarks[8];
                const pinchDist = distance3D(thumb, index) / palmSize;
                const pinching = pinchDist < 0.36;

                const fingerOpen = {
                    index: distance3D(wrist, landmarks[8]) > distance3D(wrist, landmarks[6]) * 1.08,
                    middle: distance3D(wrist, landmarks[12]) > distance3D(wrist, landmarks[10]) * 1.08,
                    ring: distance3D(wrist, landmarks[16]) > distance3D(wrist, landmarks[14]) * 1.08,
                    pinky: distance3D(wrist, landmarks[20]) > distance3D(wrist, landmarks[18]) * 1.08,
                    thumb: distance3D(wrist, landmarks[4]) > distance3D(wrist, landmarks[2]) * 1.08
                };
                let openFingers = 0;
                Object.keys(fingerOpen).forEach(key => {
                    if (fingerOpen[key]) openFingers += 1;
                });

                updatePointer(rawX * viewW, rawY * viewH, pinching, "camera");
                handleGesture(openFingers, fingerOpen, palmSize);
                previousPalmSize = palmSize;
            }

            async function startCameraTracking() {
                if (!window.Hands || !window.Camera) {
                    loadingIndicator.classList.add("is-hidden");
                    setStatus("点击画面开始", "手势组件未加载，已切换为鼠标控制");
                    return;
                }

                try {
                    const hands = new Hands({
                        locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
                    });

                    hands.setOptions({
                        maxNumHands: 1,
                        modelComplexity: 1,
                        minDetectionConfidence: 0.68,
                        minTrackingConfidence: 0.68
                    });

                    hands.onResults(onHandResults);

                    const camera = new Camera(video, {
                        onFrame: async () => {
                            if (frameBusy) return;
                            const now = performance.now();
                            const minInterval = qualityScale < 0.75 ? 95 : qualityScale < 0.9 ? 68 : 46;
                            if (now - lastGestureSentAt < minInterval) return;
                            lastGestureSentAt = now;
                            frameBusy = true;
                            try {
                                await hands.send({ image: video });
                            } finally {
                                frameBusy = false;
                            }
                        },
                        width: 640,
                        height: 480
                    });

                    await camera.start();
                    loadingIndicator.classList.add("is-hidden");
                    setStatus("张开手掌开始", "保持张开片刻，或点击画面使用鼠标控制");
                } catch (error) {
                    loadingIndicator.classList.add("is-hidden");
                    setStatus("点击画面开始", "摄像头不可用，已切换为鼠标控制");
                }
            }

            function attachPointerFallback() {
                window.addEventListener("pointermove", event => {
                    if (event.pointerType === "touch" && event.buttons === 0) return;
                    updatePointer(event.clientX, event.clientY, event.buttons === 1, "pointer");
                    if (currentState === STATE.CAKE && cakeEntryCount === 1 && event.buttons === 1 && candleLit && performance.now() >= cakeReadyAt) blowOutCandle();
                }, { passive: true });

                window.addEventListener("pointerdown", event => {
                    updatePointer(event.clientX, event.clientY, true, "pointer");
                    if (currentState === STATE.IDLE) startCountdownSequence();
                    if (currentState === STATE.CAKE && cakeEntryCount === 1 && candleLit && performance.now() >= cakeReadyAt) blowOutCandle();
                }, { passive: true });

                window.addEventListener("pointerup", event => {
                    updatePointer(event.clientX, event.clientY, false, "pointer");
                }, { passive: true });

                window.addEventListener("wheel", event => {
                    if (currentState !== STATE.GLOBE || inputMode !== "pointer" || !isPinching || grabbedIndex === -1) {
                        return;
                    }
                    event.preventDefault();
                    pointerGrabScale = clamp(pointerGrabScale + (event.deltaY < 0 ? 0.13 : -0.13), 0.55, 1.95);
                }, { passive: false });

                window.addEventListener("keydown", event => {
                    if (event.key === " " || event.key === "Enter") {
                        if (currentState === STATE.IDLE) startCountdownSequence();
                    } else if (event.key.toLowerCase() === "g" && currentState === STATE.CAKE) {
                        showGlobe();
                    } else if (event.key.toLowerCase() === "c" && currentState === STATE.GLOBE) {
                        showCake();
                    } else if (event.key.toLowerCase() === "s" && currentState === STATE.GLOBE) {
                        switchPhotoShape(1);
                    }
                });
            }

            function attachPhotoInput() {
                photoTools.addEventListener("pointerdown", event => {
                    event.stopPropagation();
                });

                photoManagerPanel.addEventListener("pointerdown", event => {
                    event.stopPropagation();
                });

                photoManagerButton.addEventListener("click", event => {
                    event.stopPropagation();
                    openPhotoManager();
                });

                managerAddPhotoButton.addEventListener("click", event => {
                    event.stopPropagation();
                    photoInput.click();
                });

                managerImportButton.addEventListener("click", event => {
                    event.stopPropagation();
                    configInput.click();
                });

                managerExportButton.addEventListener("click", event => {
                    event.stopPropagation();
                    exportConfig();
                });

                managerCloseButton.addEventListener("click", event => {
                    event.stopPropagation();
                    closePhotoManager();
                });

                photoInput.addEventListener("change", () => {
                    addPhotoFiles(photoInput.files || []);
                    photoInput.value = "";
                });

                configInput.addEventListener("change", async () => {
                    const file = configInput.files?.[0];
                    configInput.value = "";
                    if (!file) return;
                    try {
                        const data = JSON.parse(await file.text());
                        applyImportedConfig(data);
                    } catch (error) {
                        setStatus("配置导入失败", "请选择之前导出的 JSON 配置文件");
                    }
                });

                window.addEventListener("dragover", event => {
                    if (currentState === STATE.GLOBE) event.preventDefault();
                });

                window.addEventListener("drop", event => {
                    if (currentState !== STATE.GLOBE) return;
                    event.preventDefault();
                    addPhotoFiles(event.dataTransfer?.files || []);
                });

                photoContainer.addEventListener("dblclick", event => {
                    const card = event.target.closest(".photo-card");
                    if (!card) return;
                    event.stopPropagation();
                    editPhotoCaption(Number(card.dataset.index || 0));
                });

                updatePhotoCount();
                buildPhotoManagerList();
            }

            function attachControlPanel() {
                settingsToggle.addEventListener("click", event => {
                    event.stopPropagation();
                    ensureAudio();
                    settingsPanel.classList.toggle("is-open");
                    playTone("tap");
                });

                applySettings.addEventListener("click", event => {
                    event.stopPropagation();
                    applyGreetingSettings();
                    settingsPanel.classList.remove("is-open");
                });

                soundToggle.addEventListener("change", () => {
                    soundEnabled = soundToggle.checked;
                    if (soundEnabled) playTone("tap");
                    saveConfig();
                });

                shapeToggle.addEventListener("click", event => {
                    event.stopPropagation();
                    switchPhotoShape(1);
                });

                posterButton.addEventListener("click", event => {
                    event.stopPropagation();
                    openPosterPanel();
                });

                posterPanel.addEventListener("pointerdown", event => {
                    event.stopPropagation();
                });

                [posterTemplate, posterBackground, posterStyle, posterQuality, posterTitleInput].forEach(control => {
                    control.addEventListener("change", refreshPosterPreview);
                    control.addEventListener("input", refreshPosterPreview);
                });

                posterBgButton.addEventListener("click", event => {
                    event.stopPropagation();
                    posterBgInput.click();
                });

                posterBgInput.addEventListener("change", () => {
                    const file = posterBgInput.files?.[0];
                    posterBgInput.value = "";
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = () => {
                        posterCustomBackground = String(reader.result || "");
                        posterBackground.value = "custom";
                        refreshPosterPreview();
                    };
                    reader.readAsDataURL(file);
                });

                posterRenderButton.addEventListener("click", event => {
                    event.stopPropagation();
                    refreshPosterPreview();
                });

                posterDownloadButton.addEventListener("click", event => {
                    event.stopPropagation();
                    downloadPoster();
                });

                posterCloseButton.addEventListener("click", event => {
                    event.stopPropagation();
                    posterPanel.classList.remove("is-open");
                    posterPanel.setAttribute("aria-hidden", "true");
                });

                demoToggle.addEventListener("click", event => {
                    event.stopPropagation();
                    demoMode = !demoMode;
                    document.body.classList.toggle("demo-mode", demoMode);
                    demoToggle.textContent = demoMode ? "退出演示" : "演示";
                    if (demoMode) {
                        closePhotoManager();
                        settingsPanel.classList.remove("is-open");
                        document.documentElement.requestFullscreen?.().catch(() => {});
                    } else if (document.fullscreenElement) {
                        document.exitFullscreen?.().catch(() => {});
                    }
                    saveConfig();
                    playTone("tap");
                });

                blowCandleButton.addEventListener("click", event => {
                    event.stopPropagation();
                    ensureAudio();
                    if (cakeEntryCount !== 1) return;
                    if (candleLit) blowOutCandle();
                    else relightCandle();
                });

                window.addEventListener("keydown", event => {
                    if (event.key === "Escape") {
                        settingsPanel.classList.remove("is-open");
                        closePhotoManager();
                        posterPanel.classList.remove("is-open");
                        posterPanel.setAttribute("aria-hidden", "true");
                    }
                });
            }

            function drawBackground() {
                ctx.globalCompositeOperation = "source-over";
                ctx.globalAlpha = 1;
                ctx.fillStyle = "rgba(2, 3, 8, 0.25)";
                ctx.fillRect(0, 0, viewW, viewH);

                backgroundStars.forEach(star => {
                    star.alpha += star.speed;
                    if (star.alpha > 1 || star.alpha < 0) star.speed = -star.speed;
                    star.x += star.drift * star.layer;
                    star.y += 0.02 * star.layer;
                    if (star.x < -4) star.x = viewW + 4;
                    if (star.x > viewW + 4) star.x = -4;
                    if (star.y > viewH + 4) star.y = -4;
                    ctx.globalAlpha = Math.max(0, star.alpha * (0.24 + star.layer * 0.24));
                    ctx.fillStyle = "#ffffff";
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.size * (0.75 + star.layer * 0.6), 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.globalAlpha = 1;
            }

            function drawBlessingOrbit(now) {
                if (currentState !== STATE.GLOBE) return;
                const messages = getBlessingMessages();
                if (!messages.length) return;

                const cx = viewW / 2;
                const cy = viewH / 2 + globeYOffset();
                const radiusX = clamp(viewW * 0.3, 150, 420);
                const radiusY = clamp(viewH * 0.19, 82, 210);
                ctx.save();
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.font = `800 ${clamp(viewW / 54, 14, 22)}px "Microsoft YaHei", "PingFang SC", sans-serif`;
                ctx.shadowBlur = 16;
                ctx.shadowColor = "rgba(112, 248, 255, 0.82)";
                messages.forEach((message, index) => {
                    const angle = now * 0.00028 + index * Math.PI * 2 / messages.length;
                    const z = Math.sin(angle);
                    const x = cx + Math.cos(angle) * radiusX;
                    const y = cy + Math.sin(angle) * radiusY * 0.38 - 12;
                    const alpha = clamp(0.28 + (z + 1) * 0.32, 0.24, 0.92);
                    const scale = clamp(0.78 + (z + 1) * 0.14, 0.72, 1.08);
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = z > 0 ? "rgba(218, 255, 255, 0.96)" : "rgba(120, 238, 255, 0.54)";
                    ctx.save();
                    ctx.translate(x, y);
                    ctx.scale(scale, scale);
                    ctx.fillText(message, 0, 0);
                    ctx.restore();
                });
                ctx.restore();
                ctx.globalAlpha = 1;
            }

            function drawCakeStageGlow(now) {
                if (currentState !== STATE.CAKE) return;
                const cx = viewW / 2;
                const cy = viewH / 2 + clamp(viewH * 0.18, 82, 150);
                const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, clamp(viewW * 0.36, 140, 360));
                glow.addColorStop(0, "rgba(72, 219, 255, 0.2)");
                glow.addColorStop(0.42, "rgba(45, 80, 255, 0.11)");
                glow.addColorStop(1, "rgba(0, 0, 0, 0)");
                ctx.save();
                ctx.globalCompositeOperation = "lighter";
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.ellipse(cx, cy, clamp(viewW * 0.28, 110, 280), clamp(viewH * 0.085, 42, 86), 0, 0, Math.PI * 2);
                ctx.fill();

                const titleGlowY = viewH / 2 - clamp(viewH * 0.26, 126, 196);
                const pulse = 0.75 + Math.sin(now * 0.003) * 0.15;
                ctx.globalAlpha = pulse;
                ctx.shadowBlur = 34;
                ctx.shadowColor = "rgba(106, 248, 255, 0.44)";
                ctx.strokeStyle = "rgba(104, 238, 255, 0.16)";
                ctx.lineWidth = 12;
                ctx.beginPath();
                ctx.ellipse(cx, titleGlowY, clamp(viewW * 0.24, 110, 260), 32, 0, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();
                ctx.globalAlpha = 1;
            }

            function drawCandleEffects(now, rotX, rotY) {
                if (currentState !== STATE.CAKE) return;
                const s = clamp(Math.min(viewW / 620, viewH / 560), 0.9, 1.34);
                const flameWorld = rotatePoint(0, (68 - 188) * s, 0, rotX, rotY);
                const flame = projectPoint(flameWorld.x, flameWorld.y, flameWorld.z);

                if (candleLit) {
                    const pulse = 1 + Math.sin(now * 0.018) * 0.1;
                    const glow = ctx.createRadialGradient(flame.x, flame.y, 0, flame.x, flame.y, 28 * pulse);
                    glow.addColorStop(0, "rgba(255, 255, 255, 0.92)");
                    glow.addColorStop(0.22, "rgba(255, 234, 128, 0.82)");
                    glow.addColorStop(0.58, "rgba(55, 232, 255, 0.28)");
                    glow.addColorStop(1, "rgba(55, 232, 255, 0)");
                    ctx.save();
                    ctx.globalCompositeOperation = "lighter";
                    ctx.fillStyle = glow;
                    ctx.beginPath();
                    ctx.arc(flame.x, flame.y, 30 * pulse, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = "rgba(255, 244, 190, 0.95)";
                    ctx.beginPath();
                    ctx.ellipse(flame.x, flame.y - 6 * pulse, 5.5 * pulse, 14 * pulse, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }

                if (candleShockwaveStarted) {
                    const elapsed = now - candleShockwaveStarted;
                    if (elapsed < 950) {
                        const radius = 12 + elapsed * 0.16;
                        const alpha = 1 - elapsed / 950;
                        ctx.save();
                        ctx.globalCompositeOperation = "lighter";
                        ctx.strokeStyle = `rgba(116, 248, 255, ${alpha * 0.58})`;
                        ctx.lineWidth = 3 + alpha * 5;
                        ctx.beginPath();
                        ctx.arc(flame.x, flame.y, radius, 0, Math.PI * 2);
                        ctx.stroke();
                        ctx.restore();
                    } else {
                        candleShockwaveStarted = 0;
                    }
                }

                for (let i = candleSmoke.length - 1; i >= 0; i -= 1) {
                    const smoke = candleSmoke[i];
                    smoke.x += smoke.vx;
                    smoke.y += smoke.vy;
                    smoke.z += smoke.vz || 0;
                    smoke.alpha -= 0.0065;
                    smoke.size += 0.075;
                    const rotated = rotatePoint(smoke.x, smoke.y, smoke.z, rotX, rotY);
                    const projected = projectPoint(rotated.x, rotated.y, rotated.z);
                    ctx.globalAlpha = Math.max(0, smoke.alpha);
                    ctx.fillStyle = "rgba(210, 245, 255, 0.66)";
                    ctx.beginPath();
                    ctx.arc(projected.x, projected.y, smoke.size, 0, Math.PI * 2);
                    ctx.fill();
                    if (smoke.alpha <= 0) candleSmoke.splice(i, 1);
                }

                ctx.save();
                ctx.globalCompositeOperation = "lighter";
                for (let i = candleSparks.length - 1; i >= 0; i -= 1) {
                    const spark = candleSparks[i];
                    spark.x += spark.vx;
                    spark.y += spark.vy;
                    spark.z += spark.vz;
                    spark.vx *= 0.95;
                    spark.vy += 0.035;
                    spark.vz *= 0.95;
                    spark.alpha -= 0.022;
                    const rotated = rotatePoint(spark.x, spark.y, spark.z, rotX, rotY);
                    const projected = projectPoint(rotated.x, rotated.y, rotated.z);
                    ctx.globalAlpha = Math.max(0, spark.alpha);
                    ctx.fillStyle = spark.color;
                    ctx.beginPath();
                    ctx.arc(projected.x, projected.y, spark.size, 0, Math.PI * 2);
                    ctx.fill();
                    if (spark.alpha <= 0) candleSparks.splice(i, 1);
                }
                ctx.restore();
                ctx.globalAlpha = 1;
            }

            // ═══════════════════════════════════════
            // 主渲染循环
            // ═══════════════════════════════════════
            function animate(now) {
                if (lastFrameAt) {
                    const delta = now - lastFrameAt;
                    avgFrameMs += (delta - avgFrameMs) * 0.035;
                    const targetQuality = avgFrameMs > 26 ? 0.68 : avgFrameMs > 21 ? 0.82 : 1;
                    qualityScale += (targetQuality - qualityScale) * 0.02;
                }
                lastFrameAt = now;
                drawBackground();

                let rotY = 0;
                let rotX = 0;
                if (currentState === STATE.GLOBE) {
                    rotY = angleY + now * 0.00025;
                    rotX = angleX;
                } else if (currentState === STATE.CAKE) {
                    rotY = now * 0.00072;
                    rotX = Math.sin(now * 0.00034) * 0.1;
                }

                drawCakeStageGlow(now);

                ctx.globalCompositeOperation = "lighter";
                for (let i = particles.length - 1; i >= 0; i -= 1) {
                    const particle = particles[i];
                    particle.update(rotX, rotY);
                    particle.draw();
                    if (currentState === STATE.BURST && particle.alpha <= 0) {
                        particles.splice(i, 1);
                    }
                }
                ctx.globalAlpha = 1;
                ctx.globalCompositeOperation = "source-over";

                drawCandleEffects(now, rotX, rotY);
                drawBlessingOrbit(now);
                update3DPhotoGlobe(now);

                if (inputMode === "camera" && performance.now() - lastInputAt > 1600) {
                    resetInputPoint();
                }

                requestAnimationFrame(animate);
            }

            window.addEventListener("resize", resize, { passive: true });
            loadConfig();
            refreshPhotoCards();
            resize();
            attachPointerFallback();
            attachPhotoInput();
            attachControlPanel();
            startCameraTracking();
            saveConfig();
            requestAnimationFrame(animate);
        })();
    </script>
</body>
